<svg viewBox="0 0 340 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0d2347"/>
      <stop offset="100%" stop-color="#040d1a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="340" height="420" fill="url(#bg)"/>

  <!-- P shape outer (lime) — stem + bowl + diagonal bottom cut -->
  <path d="
    M 60,28
    L 210,28
    Q 295,28 295,108
    Q 295,188 210,188
    L 128,188
    L 128,268
    L 60,238
    Z
  " fill="#b5e52a"/>

  <!-- P inner counter cutout -->
  <path d="
    M 128,78
    L 195,78
    Q 240,78 240,108
    Q 240,138 195,138
    L 128,138
    Z
  " fill="#040d1a"/>

  <!-- Ball (sits at bottom-right of bowl, partially overlapping) -->
  <circle cx="258" cy="203" r="40" fill="#b5e52a"/>
  <!-- Ball seam: left curved C -->
  <path d="M 244,183 Q 222,203 244,223" stroke="#040d1a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Ball seam: right reverse-C -->
  <path d="M 270,183 Q 292,203 270,223" stroke="#040d1a" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- PENTA text -->
  <text
    x="170" y="318"
    font-family="'Barlow Condensed', 'Arial Black', sans-serif"
    font-size="90"
    font-weight="900"
    fill="#b5e52a"
    text-anchor="middle"
    letter-spacing="3">PENTA</text>

  <!-- PADEL text -->
  <text
    x="170" y="395"
    font-family="'Barlow Condensed', 'Arial Black', sans-serif"
    font-size="78"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="10">PADEL</text>
</svg>
